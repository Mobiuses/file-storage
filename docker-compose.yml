version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: file_storage_db
    environment:
      MYSQL_DATABASE: file_storage
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - file_network
    command: --default-authentication-plugin=mysql_native_password

  rabbitmq:
    image: rabbitmq:3-management
    container_name: file_storage_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - file_network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file_storage_php
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - file_network
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: file_storage
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123

  nginx:
    image: nginx:alpine
    container_name: file_storage_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./Docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - file_network

  consumer:
    build:
      context: .
      dockerfile: Docker/Dockerfile.consumer
    container_name: file_storage_consumer
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - file_network
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: file_storage
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file_storage_scheduler
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - file_network
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: file_storage
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
    command: php artisan schedule:work
    restart: unless-stopped

  composer:
    image: composer:latest
    container_name: file_storage_composer
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - file_network
    profiles:
      - tools

  node:
    image: node:18-alpine
    container_name: file_storage_node
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - file_network
    profiles:
      - tools

volumes:
  mysql_data:
  rabbitmq_data:

networks:
  file_network:
    driver: bridge
